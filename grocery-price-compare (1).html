<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CartWatch — Grocery Price Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f8f5;
  --white: #ffffff;
  --border: #e8ebe3;
  --border2: #d4d9cc;
  --text: #1a1e14;
  --muted: #7a8070;
  --light: #f0f2ec;
  --green: #2e7d52;
  --green-light: #e8f5ee;
  --green-mid: #4caf7d;
  --red: #c0392b;
  --blue: #2563a8;
  --blue-light: #e8f0fb;
  --amber: #d97706;
  --amber-light: #fef3c7;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow: 0 4px 16px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.10);
  --radius: 14px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--text); font-family: 'Nunito', sans-serif; font-weight: 400; min-height: 100vh; }

header { background: var(--white); border-bottom: 1px solid var(--border); padding: 0 40px; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow-sm); }
.header-inner { max-width: 1400px; margin: 0 auto; height: 68px; display: flex; align-items: center; gap: 20px; }
.logo { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; white-space: nowrap; }
.logo .dot { color: var(--green); }
.logo-sub { font-size: 0.62rem; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; font-weight: 500; }
.divider-v { width: 1px; height: 28px; background: var(--border); flex-shrink: 0; }
.country-toggle { display: flex; background: var(--light); border-radius: 30px; padding: 3px; gap: 2px; }
.ctry-btn { padding: 6px 16px; border-radius: 26px; font-size: 0.76rem; font-weight: 600; cursor: pointer; border: none; background: transparent; color: var(--muted); font-family: 'Nunito', sans-serif; transition: all 0.2s; }
.ctry-btn.active-ca { background: #fff0ee; color: var(--red); box-shadow: var(--shadow-sm); }
.ctry-btn.active-us { background: var(--blue-light); color: var(--blue); box-shadow: var(--shadow-sm); }
.ctry-btn.active-all { background: var(--white); color: var(--text); box-shadow: var(--shadow-sm); }
.header-search { flex: 1; max-width: 340px; position: relative; }
.header-search svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); width: 15px; height: 15px; pointer-events: none; }
.header-search input { width: 100%; background: var(--light); border: 1.5px solid transparent; border-radius: 30px; color: var(--text); font-family: 'Nunito', sans-serif; font-size: 0.83rem; padding: 9px 16px 9px 35px; outline: none; transition: all 0.2s; }
.header-search input:focus { background: var(--white); border-color: var(--green-mid); }
.header-search input::placeholder { color: var(--muted); }
.updated-tag { margin-left: auto; font-size: 0.67rem; color: var(--muted); white-space: nowrap; display: flex; align-items: center; gap: 5px; }
.updated-dot { width: 6px; height: 6px; background: var(--green-mid); border-radius: 50%; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.3)} }

.hero { background: linear-gradient(135deg, #1a4731 0%, #2e7d52 60%, #3a9966 100%); padding: 36px 40px 32px; position: relative; overflow: hidden; }
.hero::after { content:''; position:absolute; right:-60px; bottom:-80px; width:300px; height:300px; border-radius:50%; background:rgba(255,255,255,0.04); }
.hero-inner { max-width:1400px; margin:0 auto; position:relative; z-index:1; }
.hero h1 { font-family:'Playfair Display',serif; font-size:2rem; color:#fff; font-weight:700; letter-spacing:-0.03em; margin-bottom:7px; line-height:1.15; }
.hero p { color:rgba(255,255,255,0.7); font-size:0.88rem; max-width:520px; }
.hero-stats { display:flex; gap:20px; margin-top:20px; flex-wrap:wrap; }
.hstat { background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.15); border-radius:10px; padding:10px 16px; }
.hstat-n { font-family:'Playfair Display',serif; font-size:1.35rem; font-weight:700; color:#fff; line-height:1; }
.hstat-l { font-size:0.66rem; color:rgba(255,255,255,0.6); margin-top:3px; letter-spacing:0.06em; text-transform:uppercase; }

.best-banner { background:var(--white); border-bottom:1px solid var(--border); padding:12px 40px; }
.best-banner-inner { max-width:1400px; margin:0 auto; display:flex; align-items:center; gap:10px; }
.best-label { font-size:0.68rem; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:var(--amber); background:var(--amber-light); padding:3px 10px; border-radius:20px; white-space:nowrap; }
.best-text { font-size:0.82rem; color:var(--text); font-weight:500; }
.best-text span { color:var(--green); font-weight:700; }

.filter-bar { background:var(--white); border-bottom:1px solid var(--border); padding:0 40px; position:sticky; top:68px; z-index:90; }
.filter-inner { max-width:1400px; margin:0 auto; display:flex; gap:6px; align-items:center; height:50px; overflow-x:auto; scrollbar-width:none; }
.filter-inner::-webkit-scrollbar { display:none; }
.cat-btn { display:flex; align-items:center; gap:4px; padding:6px 14px; border-radius:30px; font-size:0.76rem; font-weight:600; cursor:pointer; border:1.5px solid var(--border); background:transparent; color:var(--muted); font-family:'Nunito',sans-serif; transition:all 0.18s; white-space:nowrap; }
.cat-btn:hover { border-color:var(--green-mid); color:var(--green); }
.cat-btn.active { background:var(--green); color:#fff; border-color:var(--green); }
.sort-sep { width:1px; height:22px; background:var(--border); margin:0 6px; flex-shrink:0; }
.sort-label { font-size:0.68rem; color:var(--muted); white-space:nowrap; font-weight:500; }
.sort-sel { background:var(--light); border:1.5px solid var(--border); border-radius:8px; color:var(--text); font-family:'Nunito',sans-serif; font-size:0.76rem; font-weight:600; padding:5px 10px; cursor:pointer; outline:none; }

.main-wrap { max-width:1400px; margin:0 auto; padding:24px 40px 80px; }
.results-bar { display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; }
.results-count { font-size:0.79rem; color:var(--muted); font-weight:500; }
.results-count strong { color:var(--text); }

.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(285px,1fr)); gap:16px; }

.card { background:var(--white); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; transition:box-shadow 0.22s,transform 0.22s; animation:cardIn 0.35s ease both; }
.card:hover { box-shadow:var(--shadow-lg); transform:translateY(-3px); }
@keyframes cardIn { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }

.card-img-wrap { position:relative; height:165px; overflow:hidden; background:var(--light); }
.card-img-wrap img { width:100%; height:100%; object-fit:cover; transition:transform 0.4s ease; display:block; }
.card:hover .card-img-wrap img { transform:scale(1.06); }
.img-placeholder { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:3.2rem; background:linear-gradient(135deg,#f0f4ee,#e4ece0); }
.card-country-badge { position:absolute; top:10px; right:10px; font-size:0.63rem; font-weight:700; letter-spacing:0.08em; padding:3px 9px; border-radius:20px; backdrop-filter:blur(8px); }
.badge-ca { background:rgba(255,255,255,0.9); color:var(--red); }
.badge-us { background:rgba(255,255,255,0.9); color:var(--blue); }
.card-cat-badge { position:absolute; top:10px; left:10px; font-size:0.61rem; font-weight:600; letter-spacing:0.06em; padding:3px 9px; border-radius:20px; background:rgba(255,255,255,0.9); color:var(--muted); backdrop-filter:blur(8px); text-transform:capitalize; }

.card-body { padding:14px 16px 10px; }
.card-name { font-family:'Playfair Display',serif; font-size:1.02rem; font-weight:600; color:var(--text); letter-spacing:-0.01em; margin-bottom:2px; }
.card-unit { font-size:0.68rem; color:var(--muted); font-weight:500; margin-bottom:12px; }
.price-rows { display:flex; flex-direction:column; gap:2px; }
.prow { display:flex; align-items:center; gap:7px; padding:6px 8px; border-radius:8px; transition:background 0.15s; }
.prow:hover { background:var(--light); }
.prow.best { background:var(--green-light); }
.prow-store { flex:1; font-size:0.76rem; color:var(--text); font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.prow.best .prow-store { color:var(--green); font-weight:600; }
.prow-bar-wrap { width:52px; height:4px; background:var(--border); border-radius:2px; flex-shrink:0; }
.prow-bar { height:100%; border-radius:2px; background:var(--border2); transition:width 0.5s ease; }
.prow.best .prow-bar { background:var(--green-mid); }
.prow-price { font-family:'Playfair Display',serif; font-size:0.98rem; font-weight:700; color:var(--text); white-space:nowrap; }
.prow.best .prow-price { color:var(--green); }
.prow-cur { font-size:0.58rem; color:var(--muted); font-weight:600; letter-spacing:0.06em; width:22px; }
.best-tick { font-size:0.57rem; font-weight:700; color:var(--green); letter-spacing:0.06em; background:#c8f0d8; padding:2px 6px; border-radius:10px; flex-shrink:0; }

.card-footer { display:flex; align-items:center; justify-content:space-between; padding:9px 16px 13px; border-top:1px solid var(--border); margin-top:8px; }
.cf-avg { font-size:0.7rem; color:var(--muted); }
.cf-avg strong { color:var(--text); font-weight:600; }
.cf-save { font-size:0.7rem; font-weight:700; color:var(--green); background:var(--green-light); padding:3px 10px; border-radius:20px; }

.empty-state { grid-column:1/-1; text-align:center; padding:100px 24px; }
.empty-state h3 { font-family:'Playfair Display',serif; font-size:1.2rem; margin-bottom:8px; }
.empty-state p { color:var(--muted); font-size:0.84rem; }

@media(max-width:768px){
  header,.hero,.best-banner,.filter-bar{padding-left:16px;padding-right:16px}
  .main-wrap{padding:18px 16px 60px}
  .hero h1{font-size:1.5rem}
  .grid{grid-template-columns:1fr 1fr;gap:12px}
  .logo-sub,.updated-tag,.divider-v{display:none}
  .prow-bar-wrap{display:none}
}
@media(max-width:480px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div>
      <div class="logo">Cart<span class="dot">Watch</span></div>
      <div class="logo-sub">Canada &amp; USA · March 2026</div>
    </div>
    <div class="divider-v"></div>
    <div class="country-toggle">
      <button class="ctry-btn active-ca" id="btn-ca" onclick="setCountry('CA')">🍁 Canada</button>
      <button class="ctry-btn" id="btn-us" onclick="setCountry('US')">🦅 USA</button>
      <button class="ctry-btn" id="btn-all" onclick="setCountry('ALL')">🌎 Both</button>
    </div>
    <div class="header-search">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search" placeholder="Search eggs, beef, broccoli…" oninput="render()">
    </div>
    <div class="updated-tag"><div class="updated-dot"></div>Updated Mar 11, 2026</div>
  </div>
</header>

<div class="hero">
  <div class="hero-inner">
    <h1>Compare Grocery Prices<br>Across Every Major Store</h1>
    <p>Real prices. See exactly where to buy each item for less — across Canada and the United States.</p>
    <div class="hero-stats">
      <div class="hstat"><div class="hstat-n">121</div><div class="hstat-l">Items tracked</div></div>
      <div class="hstat"><div class="hstat-n">10</div><div class="hstat-l">Major retailers</div></div>
      <div class="hstat"><div class="hstat-n">2</div><div class="hstat-l">Countries</div></div>
      <div class="hstat"><div class="hstat-n" id="avg-save-stat">—</div><div class="hstat-l">Avg max saving</div></div>
    </div>
  </div>
</div>

<div class="best-banner">
  <div class="best-banner-inner">
    <span style="font-size:1rem">🏆</span>
    <span class="best-label">Best Deal</span>
    <span class="best-text" id="best-text">Loading…</span>
  </div>
</div>

<div class="filter-bar">
  <div class="filter-inner">
    <button class="cat-btn active" onclick="setCat('all',this)">All</button>
    <button class="cat-btn" onclick="setCat('dairy',this)">🥛 Dairy</button>
    <button class="cat-btn" onclick="setCat('produce',this)">🥦 Produce</button>
    <button class="cat-btn" onclick="setCat('meat',this)">🥩 Meat</button>
    <button class="cat-btn" onclick="setCat('seafood',this)">🐟 Seafood</button>
    <button class="cat-btn" onclick="setCat('frozen',this)">🧊 Frozen</button>
    <button class="cat-btn" onclick="setCat('pantry',this)">🧺 Pantry</button>
    <button class="cat-btn" onclick="setCat('bakery',this)">🍞 Bakery</button>
    <button class="cat-btn" onclick="setCat('beverages',this)">☕ Beverages</button>
    <button class="cat-btn" onclick="setCat('snacks',this)">🍪 Snacks</button>
    <button class="cat-btn" onclick="setCat('household',this)">🧴 Household</button>
    <div class="sort-sep"></div>
    <span class="sort-label">Sort:</span>
    <select class="sort-sel" onchange="setSort(this.value)">
      <option value="name">Name A–Z</option>
      <option value="cheapest">Cheapest First</option>
      <option value="savings">Best Savings</option>
      <option value="category">By Category</option>
    </select>
  </div>
</div>

<div class="main-wrap">
  <div class="results-bar"><div class="results-count" id="res-count"></div></div>
  <div class="grid" id="grid"></div>
</div>

let STATE = { country:'CA', cat:'all', sort:'name' };

function setCountry(c) {
  STATE.country = c;
  ['CA','US','ALL'].forEach(k => {
    const b = document.getElementById('btn-'+k.toLowerCase());
    b.className = 'ctry-btn' + (k===c ? ' active-'+k.toLowerCase() : '');
  });
  render();
}
function setCat(c, btn) {
  STATE.cat = c;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function setSort(v) { STATE.sort = v; render(); }

const cheapest = item => item.stores.reduce((a,b) => a.p<b.p?a:b);
const minP = item => Math.min(...item.stores.map(s=>s.p));
const maxP = item => Math.max(...item.stores.map(s=>s.p));
const sav  = item => maxP(item)-minP(item);
const avgP = item => item.stores.reduce((a,b)=>a+b.p,0)/item.stores.length;

function render() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  let list = ITEMS.filter(item => {
    const mq = !q || item.name.toLowerCase().includes(q) || item.cat.includes(q);
    const mc = STATE.cat==='all' || item.cat===STATE.cat;
    const mn = STATE.country==='ALL' || item.country===STATE.country;
    return mq && mc && mn;
  });
  if (STATE.sort==='cheapest') list.sort((a,b)=>minP(a)-minP(b));
  else if (STATE.sort==='savings') list.sort((a,b)=>sav(b)-sav(a));
  else if (STATE.sort==='category') list.sort((a,b)=>a.cat.localeCompare(b.cat)||a.name.localeCompare(b.name));
  else list.sort((a,b)=>a.name.localeCompare(b.name));

  // Stats
  const totalSav = list.length ? (list.reduce((s,i)=>s+sav(i),0)/list.length) : 0;
  const baseCur = list.length ? (list[0].stores[0].c==='CAD'?'CA$':'US$') : '';
  document.getElementById('avg-save-stat').textContent = list.length ? baseCur+totalSav.toFixed(2) : '—';

  // Best deal
  if (list.length) {
    const best = list.reduce((a,b)=>sav(b)>sav(a)?b:a);
    const bst = cheapest(best);
    const bCur = bst.c==='CAD'?'CA$':'US$';
    document.getElementById('best-text').innerHTML =
      `<strong>${best.name}</strong> cheapest at <strong>${bst.s}</strong> — <span>${bCur}${bst.p.toFixed(2)}</span>&nbsp;· Save up to ${bCur}${sav(best).toFixed(2)} vs priciest store`;
  }

  document.getElementById('res-count').innerHTML = `Showing <strong>${list.length}</strong> item${list.length!==1?'s':''}`;

  const grid = document.getElementById('grid');
  if (!list.length) {
    grid.innerHTML = `<div class="empty-state"><h3>No items found</h3><p>Try a different search or category</p></div>`;
    return;
  }

  grid.innerHTML = list.map((item, idx) => {
    const min = minP(item), max = maxP(item);
    const cur = item.stores[0].c==='CAD'?'CA$':'US$';
    const savAmt = sav(item).toFixed(2);
    const av = avgP(item).toFixed(2);
    const photoUrl = getPhoto(item.photo||item.name);
    const delay = Math.min(idx*0.025, 0.5);

    const imgHtml = photoUrl
      ? `<img src="${photoUrl}" alt="${item.name}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">\
<div class="img-placeholder" style="display:none">${item.name[0]}</div>`
      : `<div class="img-placeholder">${item.name[0]}</div>`;

    const rows = [...item.stores].sort((a,b)=>a.p-b.p).map(s => {
      const isBest = s.p===min;
      const barPct = max>min ? Math.round(((max-s.p)/(max-min))*100) : 100;
      return `<div class="prow${isBest?' best':''}">
        <span style="font-size:.95rem;width:20px">${s.f}</span>
        <span class="prow-store">${s.s}${s.n?`<br><span style="font-size:.59rem;color:var(--muted)">${s.n}</span>`:''}</span>
        <div class="prow-bar-wrap"><div class="prow-bar" style="width:${barPct}%"></div></div>
        <span class="prow-price">${cur}${s.p.toFixed(2)}</span>
        <span class="prow-cur">${s.c}</span>
        ${isBest?'<span class="best-tick">BEST</span>':''}
      </div>`;
    }).join('');

    return `<div class="card" style="animation-delay:${delay}s">
      <div class="card-img-wrap">${imgHtml}
        <span class="card-country-badge badge-${item.country.toLowerCase()}">${item.country==='CA'?'🍁 CA':'🦅 US'}</span>
        <span class="card-cat-badge">${item.cat}</span>
      </div>
      <div class="card-body">
        <div class="card-name">${item.name}</div>
        <div class="card-unit">${item.unit}</div>
        <div class="price-rows">${rows}</div>
      </div>
      <div class="card-footer">
        <div class="cf-avg">Avg: <strong>${cur}${av}</strong></div>
        ${parseFloat(savAmt)>0?`<div class="cf-save">Save up to ${cur}${savAmt}</div>`:''}
      </div>
    </div>`;
  }).join('');
}

render();
</script>
